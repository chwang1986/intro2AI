<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}前端设计系统教程{% endblock %}</title>

  <!-- 阿里普惠体 —— 阿里官方，100%免费商用 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/alibaba-puhuiti-2/Alibaba-PuHuiTi-Regular/Alibaba-PuHuiTi-Regular.css">

  <!-- 设计系统 CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/design-tokens.css') }}">

  <style>
    :root {
      --font-sans: 'Alibaba PuHuiTi 2.0', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    /* 页面骨架 */
    .page-wrapper {
      display: flex;
      min-height: 100vh;
    }

    /* 侧边导航 */
    .sider {
      width: 240px;
      background: var(--bg-card);
      border-right: 1px solid var(--border-color-split);
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
    }

    .sider-brand {
      height: 64px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      border-bottom: 1px solid var(--border-color-split);
      font-weight: 600;
      font-size: 16px;
      color: var(--text-primary);
    }

    .sider-brand svg {
      width: 28px; height: 28px;
      color: var(--color-primary);
    }

    .sider-menu {
      list-style: none;
      padding: 12px 0;
      flex: 1;
      overflow-y: auto;
    }

    .sider-menu li a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 20px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      transition: all 0.2s;
      margin: 0 10px;
      border-radius: var(--border-radius-md);
    }

    .sider-menu li a:hover {
      color: var(--color-primary);
      background: var(--color-primary-light);
    }

    .sider-menu li a.active {
      color: var(--color-primary);
      background: var(--color-primary-light);
      font-weight: 500;
    }

    .sider-menu li a .step-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: var(--border-radius-full);
      background: var(--gray-3);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-tertiary);
      flex-shrink: 0;
    }

    .sider-menu li a.active .step-num,
    .sider-menu li a:hover .step-num {
      background: var(--color-primary);
      color: var(--text-inverse);
    }

    .sider-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border-color-split);
      font-size: 12px;
      color: var(--text-tertiary);
    }

    /* 主内容区 */
    .main {
      flex: 1;
      margin-left: 240px;
      padding: 32px 40px;
      max-width: calc(100% - 240px);
    }

    .page-header {
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border-color-split);
    }

    .page-header h1 {
      font-size: var(--font-size-3xl);
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-primary);
    }

    .page-header p {
      color: var(--text-secondary);
      font-size: var(--font-size-md);
    }

    .page-header .tag {
      margin-top: 12px;
    }

    /* 教学区块 */
    .lesson-section {
      margin-bottom: 40px;
    }

    .lesson-section h2 {
      font-size: var(--font-size-xl);
      font-weight: 600;
      margin-bottom: 16px;
      padding-left: 12px;
      border-left: 4px solid var(--color-primary);
      color: var(--text-primary);
    }

    .lesson-section h3 {
      font-size: var(--font-size-lg);
      font-weight: 600;
      margin: 24px 0 12px;
      color: var(--text-primary);
    }

    .lesson-section p {
      margin-bottom: 12px;
      line-height: var(--line-height-relaxed);
      color: var(--text-secondary);
    }

    .lesson-section ul,
    .lesson-section ol {
      margin: 12px 0 12px 24px;
      color: var(--text-secondary);
      line-height: var(--line-height-relaxed);
    }

    .lesson-section li {
      margin-bottom: 6px;
    }

    .lesson-section strong {
      color: var(--text-primary);
      font-weight: 600;
    }

    /* 演示卡片 */
    .demo-card {
      border: 1px dashed var(--border-color);
      border-radius: var(--border-radius-lg);
      padding: 24px;
      margin: 16px 0;
      background: var(--gray-1);
    }

    .demo-label {
      font-size: var(--font-size-xs);
      color: var(--text-tertiary);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* 颜色展示板 */
    .color-swatch {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      border-radius: var(--border-radius-md);
      border: 1px solid var(--border-color-split);
      margin-bottom: 8px;
    }

    .color-box {
      width: 40px;
      height: 40px;
      border-radius: var(--border-radius-md);
      border: 1px solid var(--border-color-split);
      flex-shrink: 0;
    }

    .color-info {
      flex: 1;
    }

    .color-name {
      font-weight: 600;
      font-size: var(--font-size-sm);
      color: var(--text-primary);
    }

    .color-value {
      font-family: var(--font-mono);
      font-size: var(--font-size-xs);
      color: var(--text-tertiary);
    }

    /* 排版展示 */
    .type-demo {
      padding: 16px;
      border: 1px solid var(--border-color-split);
      border-radius: var(--border-radius-md);
      margin-bottom: 12px;
    }

    .type-label {
      font-size: var(--font-size-xs);
      color: var(--text-tertiary);
      margin-bottom: 4px;
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .sider { display: none; }
      .main { margin-left: 0; max-width: 100%; padding: 20px; }
    }

    /* 练习区 */
    .exercise-box {
      background: var(--color-primary-light);
      border: 1px solid var(--color-primary-light);
      border-radius: var(--border-radius-lg);
      padding: 24px;
      margin-top: 24px;
    }

    .exercise-box h3 {
      color: var(--color-primary);
      margin-top: 0;
    }

    /* 错误提示卡片 */
    .mistake-card {
      background: var(--color-error-bg);
      border: 1px solid #FFCCC7;
      border-radius: var(--border-radius-md);
      padding: 16px;
      margin: 12px 0;
    }

    .mistake-card .mistake-title {
      color: var(--color-error);
      font-weight: 600;
      font-size: var(--font-size-sm);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .mistake-card p {
      color: var(--text-secondary);
      font-size: var(--font-size-sm);
      margin: 0;
    }
  </style>

  {% block head %}{% endblock %}
</head>
<body>
  <div class="page-wrapper">
    <aside class="sider">
      <div class="sider-brand">
        <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="3"><rect x="6" y="6" width="36" height="36" rx="4"/><path d="M6 18h36M18 6v36"/></svg>
        前端设计系统
      </div>
      <ul class="sider-menu">
        <li><a href="/" class="{% if not current_step %}active{% endif %}"><span class="step-num">●</span> 教程大纲</a></li>
        {% for step in steps %}
        <li>
          <a href="/{{ step.id }}.html" class="{% if current_step == loop.index %}active{% endif %}">
            <span class="step-num">{{ loop.index }}</span>
            {{ step.title }}
          </a>
        </li>
        {% endfor %}
        <li><a href="/practice.html"><span class="step-num">★</span> 综合实战</a></li>
      </ul>
      <div class="sider-footer">
        参考 Ant Design / TDesign 规范
      </div>
    </aside>

    <main class="main">
      {% block content %}{% endblock %}
    </main>
  </div>

  {% block scripts %}{% endblock %}
</body>
</html>
