{% extends "system_base.html" %}

{% block sidebar_brand %}
  <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="3"><rect x="6" y="6" width="36" height="36" rx="4"/><path d="M6 18h36M18 6v36"/></svg>
  <span class="font-semibold text-lg">前端设计系统</span>
{% endblock %}

{% block sidebar_menu %}
<ul class="sider-menu">
  <li><a href="/" class="{% if not current_step %}active{% endif %}"><span class="step-badge">●</span> 教程大纲</a></li>
  {% for step in steps %}
  <li>
    <a href="/{{ step.id }}" class="{% if current_step == loop.index %}active{% endif %}">
      <span class="step-badge">{{ loop.index }}</span>
      {{ step.title }}
    </a>
  </li>
  {% endfor %}
  <li><a href="/practice"><span class="step-badge">★</span> 综合实战</a></li>
</ul>
<div class="sider-footer">
  参考 Ant Design / TDesign 规范
</div>
{% endblock %}

{% block head %}
<style>
  /* frontend-tutorial 特有组件 */
  .color-swatch {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 12px;
    border-radius: var(--border-radius-md);
    border: 1px solid var(--border-color-split);
    margin-bottom: 8px;
  }
  .color-box {
    width: 40px;
    height: 40px;
    border-radius: var(--border-radius-md);
    border: 1px solid var(--border-color-split);
    flex-shrink: 0;
  }
  .color-info { flex: 1; }
  .color-name {
    font-weight: 600;
    font-size: var(--font-size-sm);
    color: var(--text-primary);
  }
  .color-value {
    font-family: var(--font-mono);
    font-size: var(--font-size-xs);
    color: var(--text-tertiary);
  }
  .type-demo {
    padding: 16px;
    border: 1px solid var(--border-color-split);
    border-radius: var(--border-radius-md);
    margin-bottom: 12px;
  }
  .type-label {
    font-size: var(--font-size-xs);
    color: var(--text-tertiary);
    margin-bottom: 4px;
  }
  /* 兼容：frontend 的 page-header 有底部边框 */
  .page-header {
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border-color-split);
  }
</style>
{% endblock %}
