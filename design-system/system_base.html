<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Intro2AI{% endblock %}</title>

  <!-- 阿里普惠体 —— 阿里官方，100%免费商用 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/alibaba-puhuiti-2/Alibaba-PuHuiTi-Regular/Alibaba-PuHuiTi-Regular.css">

  <!-- ECharts —— 百度开源，Apache-2.0 -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>

  <!-- 设计系统 CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/design-tokens.css') }}">

  <style>
    /* 旧变量 → 新变量映射，保证现有教程兼容 */
    :root {
      --font-sans: 'Alibaba PuHuiTi 2.0', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      --bg: var(--bg-page);
      --surface: var(--bg-card);
      --text: var(--text-primary);
      --border: var(--border-color-split);
      --brand: var(--color-primary);
      --brand-light: var(--color-primary-light);
      --success: var(--color-success);
      --warning: var(--color-warning);
      --danger: var(--color-error);
      --radius-sm: var(--border-radius-md);
      --radius: var(--border-radius-lg);
      --radius-full: var(--border-radius-full);
      --shadow: var(--shadow-1);
      --shadow-hover: var(--shadow-2);
    }

    /* 页面骨架 */
    .page-wrapper {
      display: flex;
      min-height: 100vh;
    }

    /* 侧边导航 */
    .sider {
      width: 220px;
      background: #fff;
      border-right: 1px solid var(--border);
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
    }

    .sider-brand {
      height: 64px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 18px;
      color: var(--text);
    }

    .sider-brand svg {
      width: 32px; height: 32px;
      color: var(--brand);
    }

    .sider-menu {
      list-style: none;
      padding: 12px 0;
      flex: 1;
      overflow-y: auto;
    }

    .sider-menu li a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 24px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      transition: all 0.2s;
      margin: 0 8px;
      border-radius: var(--radius-sm);
    }

    .sider-menu li a:hover {
      color: var(--brand);
      background: var(--brand-light);
    }

    .sider-menu li a.active {
      color: var(--brand);
      background: var(--brand-light);
      font-weight: 500;
    }

    .sider-menu li a svg {
      width: 18px; height: 18px;
    }

    /* 主内容区 */
    .main {
      flex: 1;
      margin-left: 220px;
      padding: 24px 32px;
      max-width: calc(100% - 220px);
    }

    .page-header {
      margin-bottom: 24px;
    }

    .page-header h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .page-header p {
      color: var(--text-secondary);
      font-size: 14px;
    }

    /* 回到首页链接 */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-secondary);
      font-size: 13px;
      text-decoration: none;
      margin-bottom: 16px;
    }

    .back-link:hover {
      color: var(--brand);
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .sider { display: none; }
      .main { margin-left: 0; max-width: 100%; padding: 16px; }
    }
  </style>

  {% block head %}{% endblock %}
</head>
<body>
  <div class="page-wrapper">
    <aside class="sider">
      <div class="sider-brand">
        {% block sidebar_brand %}
          <svg viewBox="0 0 48 48" fill="none"><path d="M24 4L4 14v20l20 10 20-10V14L24 4z" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/><path d="M24 24v18" stroke="currentColor" stroke-width="3" stroke-linecap="round"/><path d="M24 24L42 14" stroke="currentColor" stroke-width="3" stroke-linecap="round"/><path d="M24 24L6 14" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg>
          <span style="font-weight:600;font-size:18px;">Intro2AI</span>
        {% endblock %}
      </div>
      {% block sidebar_menu %}{% endblock %}
    </aside>

    <main class="main">
      {% block content %}{% endblock %}
    </main>
  </div>

  {% block scripts %}{% endblock %}
</body>
</html>
